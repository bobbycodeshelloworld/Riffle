<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MD+SQL Viewer</title>
<style>
:root {
  /* Catppuccin Mocha — vibrant but cohesive dark */
  --bg: #1e1e2e; --panel: #181825; --ink: #cdd6f4; --muted: #a6adc8;
  --border: #313244; --accent: #cba6f7; --accent-ink: #1e1e2e;
  --code-bg: #11111b; --sel: rgba(203,166,247,0.28);
  --tab-active-ink: #f5e0dc; --tab-idle-ink: #a6adc8; --tab-hover-ink: #f5c2e7;
  --gutter-ink: #585b70; --flash: rgba(203,166,247,0.16);
  /* SQL token colors (dark) */
  --t-comment: #7f849c; --t-string: #a6e3a1; --t-dollar: #a6e3a1;
  --t-number: #fab387; --t-param: #f5c2e7; --t-keyword: #cba6f7;
  --t-type: #f9e2af; --t-func: #89b4fa; --t-ident: #cdd6f4;
  --t-qident: #94e2d5; --t-punct: #9399b2;
}
@media (prefers-color-scheme: light) {
  :root {
    /* Catppuccin Latte — bright, warm light */
    --bg: #eff1f5; --panel: #ffffff; --ink: #4c4f69; --muted: #6c6f85;
    --border: #ccd0da; --accent: #8839ef; --accent-ink: #ffffff;
    --code-bg: #e6e9ef; --sel: rgba(136,57,239,0.16);
    --tab-active-ink: #8839ef; --tab-idle-ink: #6c6f85; --tab-hover-ink: #4c4f69;
    --gutter-ink: #9ca0b0; --flash: rgba(136,57,239,0.12);
    --t-comment: #8c8fa1; --t-string: #40a02b; --t-dollar: #40a02b;
    --t-number: #fe640b; --t-param: #ea76cb; --t-keyword: #8839ef;
    --t-type: #df8e1d; --t-func: #1e66f5; --t-ident: #4c4f69;
    --t-qident: #179299; --t-punct: #6c6f85;
  }
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
::selection { background: var(--sel); }

/* ============ HEADER ============ */
header { position: sticky; top: 0; z-index: 20;
  background: var(--panel); border-bottom: 1px solid var(--border); }
.brand-row { display: flex; align-items: center; gap: 14px;
  padding: 10px 20px; border-bottom: 1px solid var(--border); }
.brand { font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
  color: var(--muted); text-transform: uppercase; }
.spacer { flex: 1; }
.ghost-btn { font-size: 12px; padding: 6px 12px; border: 1px solid var(--border);
  background: transparent; color: var(--ink); border-radius: 6px;
  cursor: pointer; font-family: inherit;
  transition: border-color 0.15s, color 0.15s; }
.ghost-btn:hover { border-color: var(--accent); color: var(--accent); }
.ghost-btn.copied { border-color: var(--accent); color: var(--accent); }
.copy-btn { font-size: 12px; font-weight: 600; padding: 6px 14px;
  border: 1px solid var(--accent); background: var(--accent); color: var(--accent-ink);
  border-radius: 6px; cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; gap: 6px;
  transition: opacity 0.15s, transform 0.05s, background 0.15s, color 0.15s; }
.copy-btn:hover { opacity: 0.92; }
.copy-btn:active { transform: translateY(1px); }
.copy-btn.copied { background: transparent; color: var(--accent); }
.copy-btn svg { width: 13px; height: 13px; }
input[type=file] { display: none; }
.hint-kbd { font-size: 11px; color: var(--muted); font-family: ui-monospace, Menlo, monospace; }
.hint-kbd kbd { padding: 1px 5px; border: 1px solid var(--border); border-radius: 3px;
  background: var(--bg); font-size: 10px; }

/* ============ TABS ============ */
.tabs-row { display: flex; align-items: stretch; overflow-x: auto;
  padding: 0 12px; min-height: 40px; scrollbar-width: thin; }
.tabs-row::-webkit-scrollbar { height: 6px; }
.tabs-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.tab { display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 12px 8px; margin: 0 2px -1px; border: none; background: transparent;
  border-bottom: 2px solid transparent; color: var(--tab-idle-ink); cursor: pointer;
  font-family: ui-monospace, Menlo, monospace; font-size: 12px;
  white-space: nowrap; transition: color 0.12s, border-color 0.12s; max-width: 280px; }
.tab:hover { color: var(--tab-hover-ink); border-bottom-color: var(--border); }
.tab.active { color: var(--tab-active-ink); border-bottom-color: var(--accent); font-weight: 600; }
.tab-name { overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
.tab-close { display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 3px; color: var(--muted);
  font-size: 14px; line-height: 1; opacity: 0;
  transition: opacity 0.12s, background 0.12s, color 0.12s; }
.tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
.tab-close:hover { background: var(--border); color: var(--ink); }

/* ============ LAYOUT ============ */
.body-layout { display: grid; grid-template-columns: minmax(0,1fr) 260px;
  max-width: 1400px; margin: 0 auto; gap: 32px; padding: 28px 24px 120px; }
@media (max-width: 900px) {
  .body-layout { grid-template-columns: minmax(0,1fr); }
  #outline { display: none; }
}
main { min-width: 0; }

/* ============ CODE ============ */
.file-meta { font-family: ui-monospace, Menlo, monospace; font-size: 11.5px;
  color: var(--muted); margin: 0 0 10px 2px; display: flex; gap: 14px; flex-wrap: wrap; }
.file-meta b { color: var(--ink); font-weight: 600; }
.code-scroll { overflow-x: auto; background: var(--code-bg);
  border: 1px solid var(--border); border-radius: 8px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 12.8px; line-height: 1.55; }
.code-scroll::-webkit-scrollbar { height: 9px; }
.code-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.row { display: flex; align-items: stretch; min-width: max-content; }
.row:first-child { padding-top: 8px; }
.row:last-child { padding-bottom: 8px; }
.row.flash .lc { background: var(--flash); }
.ln { position: sticky; left: 0; z-index: 1; flex: 0 0 auto;
  min-width: 3.4em; padding: 0 12px 0 14px; text-align: right;
  color: var(--gutter-ink); background: var(--code-bg);
  border-right: 1px solid var(--border); user-select: none;
  -webkit-user-select: none; white-space: pre; }
.lc { flex: 1 1 auto; padding: 0 16px 0 14px; white-space: pre; }
.t-comment { color: var(--t-comment); font-style: italic; }
.t-string  { color: var(--t-string); }
.t-dollar  { color: var(--t-dollar); }
.t-number  { color: var(--t-number); }
.t-param   { color: var(--t-param); }
.t-keyword { color: var(--t-keyword); font-weight: 600; }
.t-type    { color: var(--t-type); }
.t-func    { color: var(--t-func); }
.t-ident   { color: var(--t-ident); }
.t-qident  { color: var(--t-qident); }
.t-punct   { color: var(--t-punct); }

/* ============ OUTLINE ============ */
#outline { position: sticky; top: 110px; align-self: start;
  max-height: calc(100vh - 130px); overflow-y: auto;
  font-size: 13px; line-height: 1.5;
  border-left: 1px solid var(--border); padding-left: 18px; }
#outline .o-title { font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
#outline ul { list-style: none; padding: 0; margin: 0; }
.o-item { display: flex; align-items: baseline; gap: 6px; margin: 1px 0; }
.o-item a { flex: 1; min-width: 0; color: var(--muted); text-decoration: none;
  display: block; padding: 2px 0 2px 10px; margin-left: -12px;
  border-left: 2px solid transparent; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  font-family: ui-monospace, Menlo, monospace; font-size: 12px;
  transition: color 0.12s, border-color 0.12s; }
.o-item a:hover, .o-item a.active { color: var(--ink); border-left-color: var(--accent); }
.o-item.section a { color: var(--accent); text-transform: uppercase;
  letter-spacing: 0.5px; font-size: 10.5px; font-weight: 700;
  margin-top: 12px; opacity: 0.85; }
.o-copy { flex: 0 0 auto; cursor: pointer; color: var(--gutter-ink);
  font-size: 10px; font-family: ui-monospace, Menlo, monospace;
  padding: 2px 4px; border-radius: 3px; opacity: 0;
  transition: opacity 0.12s, color 0.12s; }
.o-item:hover .o-copy { opacity: 1; }
.o-copy:hover { color: var(--accent); }
.o-copy.copied { color: var(--accent); opacity: 1; }

/* ============ DROP HINT ============ */
#drop-hint { text-align: center; padding: 100px 20px; color: var(--muted);
  border: 2px dashed var(--border); border-radius: 12px; margin-top: 20px; }
#drop-hint strong { color: var(--ink); display: block; font-size: 17px; margin-bottom: 6px; }
#drop-hint .sub { font-size: 13px; margin-top: 14px; }

/* ============ DRAG OVERLAY ============ */
body.dragging::after { content: "Drop to open"; position: fixed; inset: 8px;
  border: 3px dashed var(--accent); border-radius: 14px;
  background: color-mix(in srgb, var(--accent) 8%, transparent);
  color: var(--accent); font-size: 24px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; pointer-events: none; }

/* ============ PROSE ============ */
.prose { font-size: 15.5px; line-height: 1.7; max-width: 820px; }
.prose > *:first-child { margin-top: 0; }
.prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
  font-weight: 650; line-height: 1.3; margin: 1.8em 0 0.6em;
  scroll-margin-top: 120px; position: relative;
}
.prose h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; margin-top: 0.5em; }
.prose h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.prose h3 { font-size: 1.22em; }
.prose h4 { font-size: 1.05em; }
.prose h5, .prose h6 { font-size: 0.95em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.prose .anchor {
  position: absolute; left: -24px; top: 0.05em;
  color: var(--muted); text-decoration: none; opacity: 0;
  transition: opacity 0.15s; font-weight: 400;
}
.prose h1:hover .anchor, .prose h2:hover .anchor,
.prose h3:hover .anchor, .prose h4:hover .anchor { opacity: 1; }
.prose p { margin: 0.9em 0; }
.prose a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; }
.prose a:hover { border-bottom-color: var(--accent); }
.prose code {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 0.88em; background: var(--code-bg); padding: 2px 6px;
  border-radius: 4px; border: 1px solid var(--border);
}
.prose pre {
  position: relative;
  background: var(--code-bg); padding: 16px 18px; border-radius: 8px;
  border: 1px solid var(--border); overflow-x: auto; line-height: 1.55;
  margin: 1em 0;
}
.prose pre code { background: transparent; padding: 0; border: none; font-size: 0.87em; }
.prose pre[data-lang]::before {
  content: attr(data-lang);
  position: absolute; top: 6px; right: 10px;
  font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.7px;
  color: var(--muted); font-family: ui-monospace, Menlo, monospace;
  padding: 2px 6px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 3px; transition: opacity 0.15s;
}
.prose pre:hover[data-lang]::before { opacity: 0; }
.prose pre .code-copy {
  position: absolute; top: 4px; right: 6px;
  padding: 4px 9px; font-size: 10px; font-family: ui-monospace, Menlo, monospace;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--muted); background: var(--panel);
  border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; opacity: 0;
  transition: opacity 0.15s, color 0.15s, border-color 0.15s;
}
.prose pre:hover .code-copy { opacity: 1; }
.prose pre .code-copy:hover { color: var(--ink); border-color: var(--accent); }
.prose pre .code-copy.copied { color: var(--accent); border-color: var(--accent); opacity: 1; }
.prose blockquote {
  margin: 1.2em 0; padding: 0.5em 1.1em;
  border-left: 3px solid var(--accent); color: var(--muted);
  background: var(--code-bg); border-radius: 0 6px 6px 0;
}
.prose blockquote p { margin: 0.3em 0; }
.prose table { border-collapse: collapse; margin: 1.2em 0; width: 100%; font-size: 0.92em; }
.prose th, .prose td { border: 1px solid var(--border); padding: 7px 12px; text-align: left; vertical-align: top; }
.prose th { background: var(--code-bg); font-weight: 600; }
.prose tbody tr:nth-child(even) td { background: color-mix(in srgb, var(--code-bg) 40%, transparent); }
.prose hr { border: 0; border-top: 1px solid var(--border); margin: 2.4em 0; }
.prose img { max-width: 100%; border-radius: 6px; }
.prose ul, .prose ol { padding-left: 1.6em; }
.prose li { margin: 0.3em 0; }
.prose li > input[type="checkbox"] { margin-right: 6px; transform: translateY(1px); }
.prose ul:has(> li > input[type="checkbox"]) { list-style: none; padding-left: 0.2em; }

/* ============ FIND BAR ============ */
#findbar { display: flex; align-items: center; gap: 8px; padding: 6px 20px;
  border-top: 1px solid var(--border); background: var(--panel); }
#findbar[hidden] { display: none; }
#find-input { flex: 0 1 340px; font: 12px ui-monospace, Menlo, monospace;
  padding: 5px 9px; color: var(--ink); background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px; outline: none; }
#find-input:focus { border-color: var(--accent); }
#find-count { font: 11px ui-monospace, Menlo, monospace; color: var(--muted); min-width: 64px; }
.find-nav { padding: 4px 9px; }

/* ============ EDITOR ============ */
.editor-wrap { display: flex; background: var(--code-bg);
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  height: calc(100vh - 230px); min-height: 320px; }
.editor-gutter { flex: 0 0 auto; min-width: 3.4em; padding: 8px 12px 8px 14px;
  text-align: right; color: var(--gutter-ink); background: var(--code-bg);
  border-right: 1px solid var(--border); overflow: hidden; user-select: none;
  -webkit-user-select: none; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 12.8px; line-height: 1.55; white-space: pre; }
.editor-ta { flex: 1 1 auto; padding: 8px 16px 8px 14px; background: transparent;
  color: var(--ink); border: none; outline: none; resize: none;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 12.8px; line-height: 1.55; white-space: pre; overflow: auto; tab-size: 4; }

/* ============ DIRTY DOT / NOTICES / TOAST ============ */
.tab.dirty .tab-name::after { content: " •"; color: var(--accent); }
#notice { margin: 0 0 12px; padding: 9px 14px; font-size: 12.5px;
  border: 1px solid var(--border); border-left: 3px solid var(--accent);
  border-radius: 6px; color: var(--muted); background: var(--panel); }
#edit-note { margin: 10px 0 0; font-size: 11.5px; color: var(--muted);
  font-family: ui-monospace, Menlo, monospace; }
#toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  padding: 9px 16px; font-size: 12.5px; color: var(--ink); background: var(--panel);
  border: 1px solid var(--accent); border-radius: 8px; z-index: 2000; }

/* ============ OUTLINE INDENT (markdown levels) ============ */
.o-item.o-l3 a { padding-left: 22px; font-size: 11.5px; }
.o-item.o-l4 a { padding-left: 34px; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <div class="brand-row">
    <span class="brand">MD+SQL Viewer</span>
    <span class="hint-kbd"><kbd>[</kbd> <kbd>]</kbd> switch · <kbd>x</kbd> close · <kbd>⌘E</kbd> edit · <kbd>⌘S</kbd> save · <kbd>⌘F</kbd> find</span>
    <span class="spacer"></span>
    <button class="copy-btn" id="copyAll" title="Copy the whole file to the clipboard (c)" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span>Copy file</span>
    </button>
    <button class="ghost-btn" id="editToggle" title="Toggle edit mode (⌘E)" hidden>Edit</button>
    <button class="copy-btn" id="saveBtn" title="Save (⌘S)" hidden><span>Save</span></button>
    <button class="ghost-btn" id="openBtn" title="Open files (⌘O)">Open file(s)</button>
    <input type="file" id="picker" accept=".md,.markdown,.mdown,.mkd,.sql,.ddl,.pgsql,.psql,.txt" multiple>
  </div>
  <nav class="tabs-row" id="tabs" aria-label="Open files" hidden></nav>
  <div id="findbar" hidden>
    <input id="find-input" type="text" placeholder="Find in file…" spellcheck="false">
    <span id="find-count"></span>
    <button class="ghost-btn find-nav" id="find-prev" title="Previous match (Shift+Enter)">‹</button>
    <button class="ghost-btn find-nav" id="find-next" title="Next match (Enter)">›</button>
    <button class="ghost-btn find-nav" id="find-close" title="Close (Esc)">×</button>
  </div>
</header>

<div class="body-layout">
  <main id="main">
    <div id="file-meta" class="file-meta" hidden></div>
    <div id="notice" hidden></div>
    <div id="content-host"></div>
    <div id="edit-note" hidden>This browser can't write files in place; saving downloads a copy.</div>
    <div id="drop-hint">
      <strong>Drop .md or .sql files anywhere</strong>
      <div class="sub">or click <em>Open file(s)</em> above · multiple files open as tabs</div>
    </div>
  </main>
  <aside id="outline"></aside>
</div>
<div id="toast" hidden></div>

<!--__VIEWER_SEED__-->

<script>/*__VENDOR_MARKED__*/</script>
<script>
"use strict";

/* ════════════════════════════════════════════════════════════
   CORE · pure utilities
   ════════════════════════════════════════════════════════════ */
function extOf(name) {
  const m = /\.([A-Za-z0-9]+)$/.exec(name || '');
  return m ? m[1].toLowerCase() : '';
}

const MAX_RENDER_CHARS = 5 * 1024 * 1024;
function classifyContent(source) {
  if (source.includes('\0')) return 'binary';
  if (source.length > MAX_RENDER_CHARS) return 'huge';
  return 'text';
}

function escapeHTML(s) { return s.replace(/[&<>]/g, c => (c === '&' ? '&amp;' : c === '<' ? '&lt;' : '&gt;')); }

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1024 / 1024).toFixed(1) + ' MB';
}

function b64ToString(b64) {
  const bin = atob(b64);
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  try { return new TextDecoder('utf-8', { fatal: false }).decode(bytes); }
  catch (e) { return bin; }
}

function lineStartIndex(s, line) {
  let i = 0;
  for (let l = 1; l < line; l++) {
    const nl = s.indexOf('\n', i);
    if (nl === -1) return s.length;
    i = nl + 1;
  }
  return i;
}

function truncate(s, n) { s = s.replace(/\s+/g, ' ').trim(); return s.length > n ? s.slice(0, n - 1).trimEnd() + '…' : s; }

window.__TEST__ = { extOf, classifyContent, escapeHTML, formatBytes, b64ToString, lineStartIndex, truncate };

/* ════════════════════════════════════════════════════════════
   CORE · state + renderer registry
   ════════════════════════════════════════════════════════════ */
const state = { tabs: [], activeId: null, nextId: 1 };
function activeTab() { return state.tabs.find(t => t.id === state.activeId) || null; }

const RENDERERS = {}; // filled by the sql (Task 3) and md (Task 4) sections

const plaintextRenderer = {
  render(source) {
    const lines = source.split('\n').map(l => (l === '' ? '' : escapeHTML(l)));
    return { bodyEl: buildCodeScroll(lines), outline: [], outlineTitle: null };
  }
};
function rendererFor(ext) { return RENDERERS[ext] || plaintextRenderer; }

function decodeSeed(seed) {
  if (!Array.isArray(seed)) return [];
  const out = [];
  for (const s of seed) {
    if (!s || typeof s.b64 !== 'string') continue;
    let source;
    try { source = b64ToString(s.b64); } catch (e) { continue; }
    out.push({ name: String(s.name || 'untitled'), path: String(s.path || s.name || 'untitled'), source });
  }
  return out;
}

Object.assign(window.__TEST__, { decodeSeed, rendererFor, plaintextRenderer });

/* ════════════════════════════════════════════════════════════
   RENDERERS · sql
   ════════════════════════════════════════════════════════════ */
/* ============================================================
   SQL tokenizer — offline, PostgreSQL-aware.
   Handles: -- line comments, block comments, '...' strings
   (with '' and E'\' escapes), "quoted idents", $$..$$ /
   $tag$..$tag$ dollar-quoting, $1 params, numbers, keywords,
   types, function calls, identifiers, punctuation.
   ============================================================ */
const KEYWORDS = new Set(("ABORT ACTION ADD AFTER ALL ALTER ANALYZE AND ANY AS ASC " +
  "ATOMIC AUTHORIZATION BEGIN BETWEEN BOTH BY CALL CASCADE CASE CAST CHECK CLOSE " +
  "CLUSTER COLLATE COLUMN COMMENT COMMIT CONCURRENTLY CONFLICT CONSTRAINT COPY CREATE " +
  "CROSS CURRENT CURSOR DATABASE DECLARE DEFAULT DEFERRABLE DELETE DESC DISTINCT DO " +
  "DOMAIN DROP EACH ELSE ELSIF ENABLE END EXCEPT EXCEPTION EXCLUDE EXECUTE EXISTS " +
  "EXPLAIN EXTENSION FALSE FETCH FILTER FIRST FOR FOREIGN FROM FULL FUNCTION GENERATED " +
  "GRANT GROUP GROUPING HAVING IF ILIKE IMMUTABLE IN INDEX INHERIT INITIALLY INNER " +
  "INSERT INSTEAD INTERSECT INTO INVOKER IS ISNULL JOIN KEY LANGUAGE LAST LATERAL " +
  "LEADING LEFT LEVEL LIKE LIMIT LOOP MATCHED MATERIALIZED MERGE NATURAL NEW NEXT NO " +
  "NOT NOTHING NOTNULL NULL NULLS OF OFFSET OLD ON ONLY OPERATOR OR ORDER OUTER OVER " +
  "OWNED OWNER PARTITION PERFORM PLPGSQL POLICY PRECEDING PRIMARY PROCEDURE " +
  "RAISE RANGE REASSIGN RECURSIVE REFERENCES REFRESH REINDEX RENAME REPLACE RESET " +
  "RESTRICT RETURN RETURNING RETURNS REVOKE RIGHT ROLE ROLLBACK ROW ROWS RULE SCHEMA " +
  "SECURITY SELECT SEQUENCE SESSION SET SETOF SHOW SOME STABLE START STRICT TABLE " +
  "TABLESPACE TEMP TEMPORARY THEN TO TRAILING TRANSACTION TRIGGER TRUE TRUNCATE TYPE " +
  "UNBOUNDED UNION UNIQUE UNLOGGED UPDATE USAGE USING VACUUM VALUES VARIADIC VIEW " +
  "VOLATILE WHEN WHERE WHILE WINDOW WITH WITHOUT WORK").split(/\s+/));

const TYPES = new Set(("ANYARRAY ANYELEMENT ARRAY BIGINT BIGSERIAL BIT BOOL BOOLEAN BOX " +
  "BYTEA CHAR CHARACTER CIDR CIRCLE CITEXT DATE DECIMAL DOUBLE FLOAT FLOAT4 FLOAT8 HSTORE " +
  "INET INT INT2 INT4 INT8 INTEGER INTERVAL JSON JSONB LINE LSEG MACADDR MONEY NUMERIC " +
  "OID PATH POINT POLYGON PRECISION REAL SERIAL SERIAL4 SERIAL8 SMALLINT SMALLSERIAL TEXT " +
  "TIME TIMESTAMP TIMESTAMPTZ TIMETZ TSQUERY TSVECTOR UUID VARBIT VARCHAR XML").split(/\s+/));

const RE_WS     = /\s+/y;
const RE_LINEC  = /--[^\n]*/y;
const RE_BLOCKC = /\/\*[\s\S]*?\*\//y;
const RE_DOLLAR = /\$([A-Za-z_][A-Za-z0-9_]*)?\$/y;
const RE_PARAM  = /\$\d+/y;
const RE_NUM    = /0[xX][0-9a-fA-F]+|\d+\.\d+(?:[eE][+-]?\d+)?|\.\d+(?:[eE][+-]?\d+)?|\d+(?:[eE][+-]?\d+)?/y;
const RE_IDENT  = /[A-Za-z_][A-Za-z0-9_$]*/y;

function stickyAt(re, s, i) { re.lastIndex = i; const m = re.exec(s); return m ? m[0] : null; }

function tokenizeSQL(s) {
  const toks = [];
  const n = s.length;
  let i = 0, line = 1;
  function push(t, v) { toks.push({ t, v, line }); for (let k = 0; k < v.length; k++) if (v.charCodeAt(k) === 10) line++; }

  while (i < n) {
    const c = s[i];

    if (c === ' ' || c === '\t' || c === '\n' || c === '\r') {
      const v = stickyAt(RE_WS, s, i); push('ws', v); i += v.length; continue;
    }
    if (c === '-' && s[i + 1] === '-') {
      const v = stickyAt(RE_LINEC, s, i); push('comment', v); i += v.length; continue;
    }
    if (c === '/' && s[i + 1] === '*') {
      let v = stickyAt(RE_BLOCKC, s, i);
      if (v === null) v = s.slice(i);           // unterminated block comment → to EOF
      push('comment', v); i += v.length; continue;
    }
    if (c === '$') {
      const open = stickyAt(RE_DOLLAR, s, i);
      if (open !== null) {
        const close = s.indexOf(open, i + open.length);
        const end = close === -1 ? n : close + open.length;
        push('dollar', s.slice(i, end)); i = end; continue;
      }
      const p = stickyAt(RE_PARAM, s, i);
      if (p !== null) { push('param', p); i += p.length; continue; }
      push('punct', c); i++; continue;
    }
    if (c === "'" || ((c === 'E' || c === 'e') && s[i + 1] === "'")) {
      const isE = c !== "'";
      let j = i + (isE ? 2 : 1);
      while (j < n) {
        const d = s[j];
        if (isE && d === '\\') { j += 2; continue; }
        if (d === "'") { if (s[j + 1] === "'") { j += 2; continue; } j++; break; }
        j++;
      }
      push('string', s.slice(i, j)); i = j; continue;
    }
    if (c === '"') {
      let j = i + 1;
      while (j < n) { if (s[j] === '"') { if (s[j + 1] === '"') { j += 2; continue; } j++; break; } j++; }
      push('qident', s.slice(i, j)); i = j; continue;
    }
    if ((c >= '0' && c <= '9') || (c === '.' && s[i + 1] >= '0' && s[i + 1] <= '9')) {
      const v = stickyAt(RE_NUM, s, i);
      if (v) { push('number', v); i += v.length; continue; }
    }
    const id = stickyAt(RE_IDENT, s, i);
    if (id !== null) {
      const up = id.toUpperCase();
      let t = 'ident';
      if (KEYWORDS.has(up)) t = 'keyword';
      else if (TYPES.has(up)) t = 'type';
      else { let k = i + id.length; while (k < n && (s[k] === ' ' || s[k] === '\t')) k++; if (s[k] === '(') t = 'func'; }
      push(t, id); i += id.length; continue;
    }
    push('punct', c); i++;
  }
  return toks;
}

/* tokens → array of per-line HTML strings (multi-line tokens re-wrapped per line) */
function highlightToLines(sql) {
  const toks = tokenizeSQL(sql);
  const lines = [''];
  let cur = 0;
  for (const { t, v } of toks) {
    const parts = v.split('\n');
    for (let k = 0; k < parts.length; k++) {
      if (k > 0) { lines.push(''); cur++; }
      const piece = parts[k];
      if (piece === '') continue;
      const esc = escapeHTML(piece);
      lines[cur] += (t === 'ws') ? esc : '<span class="t-' + t + '">' + esc + '</span>';
    }
  }
  return lines;
}

/* ============================================================
   Outline — statements (split on top-level ;) + banner comments
   ============================================================ */
function hasRule(v) { return /[=#*~_-]{3,}/.test(v); }
function hasLetters(v) { return /[A-Za-z]/.test(v); }
function commentLabel(v) {
  const s = v.replace(/^\/\*+/, '').replace(/\*+\/$/, '').replace(/^\s*--+/, '').replace(/[=*~_#-]{2,}/g, ' ');
  return truncate(s, 42);
}

function labelForStatement(sig) {
  const SKIP = new Set(['IF', 'NOT', 'EXISTS']);   // de-noise "CREATE TABLE IF NOT EXISTS x"
  const words = [];
  let i = 0;
  while (i < sig.length && (sig[i].t === 'keyword' || sig[i].t === 'type')) {
    const w = sig[i].v.toUpperCase();
    if (!SKIP.has(w)) words.push(w);
    i++;
    if (words.length >= 6) break;
  }
  // object name: dotted path (schema.table) of idents/quoted idents
  const nameParts = [];
  while (i < sig.length && (sig[i].t === 'ident' || sig[i].t === 'qident' || sig[i].t === 'func')) {
    nameParts.push(sig[i].v); i++;
    if (sig[i] && sig[i].t === 'punct' && sig[i].v === '.') { nameParts.push('.'); i++; continue; }
    break;
  }
  let name = nameParts.join('');
  if (!name && sig[i] && sig[i].t === 'dollar') name = '$$…$$';
  const label = (words.join(' ') + (name ? ' ' + name : '')).trim();
  return label ? truncate(label, 46) : null;
}

function buildSQLOutline(sql) {
  const toks = tokenizeSQL(sql);
  const entries = [];
  let stmt = [];
  let block = null;   // leading run of consecutive comment lines
  const flush = () => {
    const sig = stmt.filter(t => t.t !== 'ws' && t.t !== 'comment');
    if (sig.length) {
      const label = labelForStatement(sig);
      if (label) entries.push({ label, line: sig[0].line, kind: 'stmt', text: stmt.map(t => t.v).join('').trim() });
    }
    stmt = [];
  };
  // Emit ONE section per banner-style comment block (a block containing a rule
  // run like `-- ====`), labeled by its first line that has actual words.
  const closeBlock = () => {
    if (block && block.texts.some(hasRule)) {
      for (const t of block.texts) {
        for (const ln of t.split('\n')) {
          if (hasLetters(ln) && !/^[\s=#*~_-]+$/.test(ln)) {
            const lab = commentLabel(ln);
            if (lab) { entries.push({ label: lab, line: block.line, kind: 'section' }); block = null; return; }
          }
        }
      }
    }
    block = null;
  };
  for (const tk of toks) {
    const fresh = stmt.every(t => t.t === 'ws' || t.t === 'comment');
    if (tk.t === 'comment' && fresh) {
      if (!block) block = { line: tk.line, texts: [] };
      block.texts.push(tk.v);
    } else if (tk.t !== 'ws') {
      closeBlock();
    }
    stmt.push(tk);
    if (tk.t === 'punct' && tk.v === ';') flush();
  }
  closeBlock();
  flush();
  return entries;
}

const sqlRenderer = {
  render(source) {
    const bodyEl = buildCodeScroll(highlightToLines(source));
    const entries = buildSQLOutline(source).map(e =>
      ({ label: e.label, line: e.line, kind: e.kind, text: e.text,
         level: e.kind === 'section' ? 1 : 2 }));
    const stmtCount = entries.filter(e => e.kind === 'stmt').length;
    return { bodyEl, outline: entries, outlineTitle: 'Statements (' + stmtCount + ')' };
  }
};
RENDERERS.sql = RENDERERS.ddl = RENDERERS.pgsql = RENDERERS.psql = sqlRenderer;

Object.assign(window.__TEST__, { tokenizeSQL, highlightToLines, buildSQLOutline, sqlRenderer });

/* ════════════════════════════════════════════════════════════
   CORE · rendering primitives (ported from sql-viewer.html)
   ════════════════════════════════════════════════════════════ */
let outlineLinks = [];   // { a, line } for scrollspy

function buildCodeScroll(lineHTML) {
  const scroll = document.createElement('div');
  scroll.className = 'code-scroll';
  const gw = Math.max(2.6, String(lineHTML.length).length + 1.2) + 'em';
  const frag = document.createDocumentFragment();
  lineHTML.forEach((html, idx) => {
    const n = idx + 1;
    const row = document.createElement('div');
    row.className = 'row';
    row.id = 'line-' + n;
    row.innerHTML = '<span class="ln" style="min-width:' + gw + '">' + n + '</span><span class="lc">' + (html || '') + '</span>';
    frag.appendChild(row);
  });
  scroll.appendChild(frag);
  return scroll;
}

function flashLine(n) {
  const row = document.getElementById('line-' + n);
  if (!row) return;
  row.scrollIntoView({ block: 'center', behavior: 'smooth' });
  row.classList.add('flash');
  setTimeout(() => row.classList.remove('flash'), 900);
}

function copyText(text, btn, doneLabel) {
  const labelEl = btn.querySelector('span') || btn;   // keep an icon sibling intact
  const old = labelEl.textContent;
  navigator.clipboard.writeText(text).then(() => {
    labelEl.textContent = doneLabel; btn.classList.add('copied');
    setTimeout(() => { labelEl.textContent = old; btn.classList.remove('copied'); }, 1100);
  }).catch(() => { labelEl.textContent = 'Failed'; setTimeout(() => { labelEl.textContent = old; }, 1100); });
}

/* ════════════════════════════════════════════════════════════
   CORE · tabs (ported from sql-viewer.html)
   ════════════════════════════════════════════════════════════ */
function renderTabs() {
  tabsEl.innerHTML = '';
  state.tabs.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (t.id === state.activeId ? ' active' : '');
    btn.title = t.path || t.name;
    btn.dataset.id = String(t.id);
    btn.addEventListener('click', () => setActive(t.id));
    const name = document.createElement('span');
    name.className = 'tab-name'; name.textContent = t.name;
    btn.appendChild(name);
    const close = document.createElement('span');
    close.className = 'tab-close'; close.textContent = '×'; close.title = 'Close tab';
    close.addEventListener('click', e => { e.stopPropagation(); closeTab(t.id); });
    btn.appendChild(close);
    tabsEl.appendChild(btn);
  });
}

function setActive(id) { if (state.activeId === id) return; state.activeId = id; renderTabs(); renderActive(); }
function closeTab(id) {
  const idx = state.tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  state.tabs.splice(idx, 1);
  if (state.activeId === id) { const next = state.tabs[idx] || state.tabs[idx - 1]; state.activeId = next ? next.id : null; }
  renderTabs(); renderActive();
}
function prevTab() { if (state.tabs.length < 2) return; const i = state.tabs.findIndex(t => t.id === state.activeId); setActive(state.tabs[(i - 1 + state.tabs.length) % state.tabs.length].id); }
function nextTab() { if (state.tabs.length < 2) return; const i = state.tabs.findIndex(t => t.id === state.activeId); setActive(state.tabs[(i + 1) % state.tabs.length].id); }

/* ---------- scrollspy: highlight nearest outline entry above viewport ---------- */
let spyTick = false;
// window.addEventListener('scroll', …) registration lives in initApp (wiring rule).

/* ════════════════════════════════════════════════════════════
   CORE · tab lifecycle, outline pane, active render, file open
   ════════════════════════════════════════════════════════════ */
function addTab({ name, path, source, handle = null, lastModified = null }) {
  const id = state.nextId++;
  state.tabs.push({ id, name, path: path || name, ext: extOf(name), source,
    savedSource: source, handle, lastModified, mode: 'view',
    rendered: null, lastOutline: [], _ta: null });
  state.activeId = id;
  renderTabs(); renderActive();
  return id;
}

function copyActiveSource() { const t = activeTab(); if (t) copyText(t.source, copyAllBtn, 'Copied'); }

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.hidden = false;
  setTimeout(() => { toastEl.hidden = true; }, 4000);
}

function updateHeaderButtons() {
  const tab = activeTab();
  copyAllBtn.hidden = !tab;
  // editToggle/saveBtn stay hidden until Tasks 5–6
}

function renderOutlinePane(entries, title, tab) {
  outlineEl.innerHTML = '';
  outlineLinks = [];
  if (!entries.length) return;
  const t = document.createElement('div');
  t.className = 'o-title';
  t.textContent = title || 'Outline';
  outlineEl.appendChild(t);
  const ul = document.createElement('ul');
  entries.forEach(e => {
    const li = document.createElement('li');
    li.className = 'o-item' + (e.kind === 'section' ? ' section' : '') + (e.level ? ' o-l' + e.level : '');
    const a = document.createElement('a');
    a.href = e.anchor ? '#' + e.anchor : '#line-' + e.line;
    a.textContent = e.label;
    a.title = e.label + (e.line ? '  ·  line ' + e.line : '');
    a.addEventListener('click', ev => { ev.preventDefault(); jumpTo(e, tab); });
    li.appendChild(a);
    if (e.line) outlineLinks.push({ a, line: e.line });
    if (e.text) { // sql statements: hover-copy chip
      const cp = document.createElement('span');
      cp.className = 'o-copy'; cp.textContent = 'copy'; cp.title = 'Copy this statement';
      cp.addEventListener('click', ev => { ev.stopPropagation(); copyText(e.text.endsWith(';') ? e.text : e.text + ';', cp, 'ok'); });
      li.appendChild(cp);
    }
    ul.appendChild(li);
  });
  outlineEl.appendChild(ul);
}

function jumpTo(entry, tab) {
  // edit-mode branch added in Task 5
  if (entry.anchor) {
    const el = document.getElementById(entry.anchor);
    if (el) { el.scrollIntoView({ block: 'start', behavior: 'smooth' }); return; }
  }
  if (entry.line) flashLine(entry.line);
}

function renderActive() {
  const tab = activeTab();
  if (!tab) {
    contentHost.innerHTML = ''; outlineEl.innerHTML = ''; outlineLinks = [];
    metaEl.hidden = true; noticeEl.hidden = true; editNoteEl.hidden = true;
    dropHint.style.display = ''; tabsEl.hidden = true;
    document.title = 'MD+SQL Viewer';
    updateHeaderButtons();
    return;
  }
  dropHint.style.display = 'none';
  tabsEl.hidden = false;
  noticeEl.hidden = true;

  // view mode (edit mode branch added in Task 5)
  const cls = classifyContent(tab.source);
  let result;
  if (cls === 'binary') {
    const el = document.createElement('div');
    el.id = 'binary-note';
    el.textContent = 'This looks like a binary file — nothing to display.';
    el.style.cssText = 'padding:60px 20px;text-align:center;color:var(--muted)';
    result = { bodyEl: el, outline: [], outlineTitle: null };
  } else if (cls === 'huge') {
    noticeEl.textContent = 'Rendered view disabled for large files (>5 MB) — showing plain text.';
    noticeEl.hidden = false;
    result = plaintextRenderer.render(tab.source);
  } else {
    if (!tab.rendered || tab.rendered.source !== tab.source) {
      const r = rendererFor(tab.ext).render(tab.source);
      tab.rendered = { source: tab.source, bodyEl: r.bodyEl, outline: r.outline, outlineTitle: r.outlineTitle };
    }
    result = tab.rendered;
  }
  tab.lastOutline = result.outline;
  contentHost.replaceChildren(result.bodyEl);
  renderOutlinePane(result.outline, result.outlineTitle, tab);

  const lineCount = tab.source.split('\n').length;
  const bytes = new Blob([tab.source]).size;
  metaEl.innerHTML = '<span><b>' + escapeHTML(tab.name) + '</b></span>' +
    '<span>' + lineCount.toLocaleString() + ' lines</span>' +
    '<span>' + formatBytes(bytes) + '</span>';
  metaEl.hidden = false;
  document.title = tab.name + ' — MD+SQL Viewer';
  updateHeaderButtons();
  window.scrollTo(0, 0);
}

function readFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => addTab({ name: file.name, path: file.name, source: e.target.result,
    lastModified: file.lastModified || null });
  reader.readAsText(file);
}

/* ════════════════════════════════════════════════════════════
   CORE · app bootstrap (all DOM access lives in initApp)
   ════════════════════════════════════════════════════════════ */
let tabsEl, contentHost, outlineEl, metaEl, dropHint, copyAllBtn, editBtn, saveBtn,
    openBtn, pickerInput, noticeEl, editNoteEl, toastEl,
    findbarEl, findInputEl, findCountEl;

function initApp() {
  tabsEl = document.getElementById('tabs');
  contentHost = document.getElementById('content-host');
  outlineEl = document.getElementById('outline');
  metaEl = document.getElementById('file-meta');
  dropHint = document.getElementById('drop-hint');
  copyAllBtn = document.getElementById('copyAll');
  editBtn = document.getElementById('editToggle');
  saveBtn = document.getElementById('saveBtn');
  openBtn = document.getElementById('openBtn');
  pickerInput = document.getElementById('picker');
  noticeEl = document.getElementById('notice');
  editNoteEl = document.getElementById('edit-note');
  toastEl = document.getElementById('toast');
  findbarEl = document.getElementById('findbar');
  findInputEl = document.getElementById('find-input');
  findCountEl = document.getElementById('find-count');

  // ---- open paths (handle-aware upgrades land in Task 6) ----
  openBtn.addEventListener('click', () => pickerInput.click());
  pickerInput.addEventListener('change', e => { Array.from(e.target.files).forEach(readFile); e.target.value = ''; });
  copyAllBtn.addEventListener('click', copyActiveSource);

  ['dragenter', 'dragover'].forEach(evt => document.addEventListener(evt, e => { e.preventDefault(); document.body.classList.add('dragging'); }));
  ['dragleave', 'drop'].forEach(evt => document.addEventListener(evt, e => { e.preventDefault(); document.body.classList.remove('dragging'); }));
  document.addEventListener('drop', e => { e.preventDefault(); Array.from(e.dataTransfer.files).forEach(readFile); });

  // ---- keyboard (⌘-chords added in Tasks 5–7) ----
  document.addEventListener('keydown', e => {
    const tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea') return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === '[') { e.preventDefault(); prevTab(); }
    else if (e.key === ']') { e.preventDefault(); nextTab(); }
    else if (e.key === 'x' && state.activeId) { e.preventDefault(); closeTab(state.activeId); }
    else if (e.key === 'c' && state.activeId) { e.preventDefault(); copyActiveSource(); }
  });

  // ---- scrollspy (ported registration moved here) ----
  window.addEventListener('scroll', () => {
    if (spyTick || !outlineLinks.length) return;
    spyTick = true;
    requestAnimationFrame(() => {
      spyTick = false;
      const mark = 140;
      let active = null;
      for (const { a, line } of outlineLinks) {
        const row = document.getElementById('line-' + line);
        if (row && row.getBoundingClientRect().top <= mark) active = a; else break;
      }
      outlineLinks.forEach(o => o.a.classList.toggle('active', o.a === active));
    });
  }, { passive: true });

  // ---- seed from the macOS launcher ----
  if (window.__SEED__ !== undefined) {
    const items = decodeSeed(window.__SEED__);
    items.forEach(it => addTab(it));
    if (!items.length) toast("Couldn't decode the file passed by the launcher.");
    else setActive(state.tabs[0].id);
  }

  window.__TEST__.app = { state, activeTab, addTab, closeTab, setActive, prevTab, nextTab, renderActive };

  // Test mode: viewer.html?test=1 pulls in the browser suite (classic script;
  // iframes/ES modules don't work over file://).
  if (/[?&]test=1/.test(location.search)) {
    const s = document.createElement('script');
    s.src = 'tests/browser-tests.js';
    document.body.appendChild(s);
  }
}

if (typeof document !== 'undefined') initApp();
</script>
